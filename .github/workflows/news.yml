on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5  
        with:
          python-version: '3.11'
      - run: pip install feedparser requests
      - run: python reading_dojo.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
